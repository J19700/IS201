<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pac-Man Full</title>
<style>
body {
  margin:0;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:Arial;
}

canvas { background:black; }

#menu {
  position:absolute;
  width:480px;
  height:480px;
  background:black;
  color:white;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:10;
}

#win {
  position:absolute;
  width:480px;
  height:480px;
  background:black;
  color:yellow;
  display:none;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  font-size:40px;
  z-index:20;
}

button {
  padding:10px 20px;
  font-size:18px;
}
</style>
</head>
<body>

<div id="menu">
  <h1>Pac-Man</h1>
  <button onclick="startGame()">Play</button>
</div>

<div id="win">YOU WIN!</div>

<canvas id="game" width="480" height="480"></canvas>

<script>
const c=document.getElementById("game");
const ctx=c.getContext("2d");

const SIZE=20;
const TILE=24;

let running=false;
let frightened=0;
let freeze=0;

let tick=0;
let ghostTick=0;

let map=[];

/* PAC-MAN */
let pac={
  x:1,y:1,
  dx:1,dy:0,
  nextDx:1,nextDy:0,
  anim:0
};

/* GHOSTS */
let ghosts=[
  {x:10,y:10,color:"red",timer:0,state:"house"},
  {x:9,y:10,color:"pink",timer:30,state:"house"},
  {x:11,y:10,color:"cyan",timer:60,state:"house"},
  {x:10,y:9,color:"orange",timer:90,state:"house"}
];

const base=[
"11111111111111111111",
"10300000000000000031",
"10111101111011110101",
"10000001000001000001",
"10111111011101111101",
"10000000000000000001",
"10111011111110111001",
"10001000000000001001",
"11101011101110101111",
"10000010000000100001",
"10111110111110111001",
"10000000000000000001",
"10111101111101111101",
"10000001000001000001",
"10111011011101101101",
"10000000000000000001",
"10111111101111111001",
"10000000000000000001",
"10000000000000000001",
"11111111111111111111"
];

function init(){
  map=[];
  for(let y=0;y<SIZE;y++){
    map[y]=[];
    for(let x=0;x<SIZE;x++){

      if(base[y][x]==="1"){
        map[y][x]=1;
        continue;
      }

      let safe =
        Math.abs(x-1)<=1 &&
        Math.abs(y-1)<=1;

      if(base[y][x]==="3" && !safe){
        map[y][x]=3;
      } else if(safe){
        map[y][x]=0;
      } else {
        map[y][x]=2;
      }
    }
  }
}

function can(x,y){
  return map[y] && map[y][x]!==1;
}

function wrap(x){
  if(x<0) return SIZE-1;
  if(x>=SIZE) return 0;
  return x;
}

/* INPUT */
document.addEventListener("keydown",e=>{
  if(e.key==="ArrowUp"){pac.nextDx=0;pac.nextDy=-1;}
  if(e.key==="ArrowDown"){pac.nextDx=0;pac.nextDy=1;}
  if(e.key==="ArrowLeft"){pac.nextDx=-1;pac.nextDy=0;}
  if(e.key==="ArrowRight"){pac.nextDx=1;pac.nextDy=0;}
});

/* PAC-MAN */
function movePac(){

  if(can(pac.x+pac.nextDx,pac.y+pac.nextDy)){
    pac.dx=pac.nextDx;
    pac.dy=pac.nextDy;
  }

  let nx=wrap(pac.x+pac.dx);
  let ny=wrap(pac.y+pac.dy);

  if(can(nx,ny)){
    pac.x=nx;
    pac.y=ny;
  }

  if(map[pac.y][pac.x]===2){
    map[pac.y][pac.x]=0;
  }

  if(map[pac.y][pac.x]===3){
    map[pac.y][pac.x]=0;
    frightened=120;
  }

  pac.anim+=0.25;
}

/* GHOST AI */
function moveGhost(g){

  if(g.state==="house"){

    if(g.timer>0){
      g.timer--;
      return;
    }

    if(g.y>8){
      g.y--;
      return;
    }

    g.state="normal";
  }

  if(g.state==="eyes"){
    let dx=10-g.x;
    let dy=10-g.y;

    if(dx===0 && dy===0){
      g.state="house";
      g.timer=40;
      return;
    }

    g.x += dx>0?1:dx<0?-1:0;
    g.y += dy>0?1:dy<0?-1:0;
    return;
  }

  let dirs=[
    {dx:1,dy:0},{dx:-1,dy:0},
    {dx:0,dy:1},{dx:0,dy:-1}
  ];

  let best=null;
  let bestDist=9999;

  for(let d of dirs){
    let nx=wrap(g.x+d.dx);
    let ny=g.y+d.dy;

    if(!can(nx,ny)) continue;

    let dist=Math.abs(pac.x-nx)+Math.abs(pac.y-ny);

    if(dist<bestDist){
      bestDist=dist;
      best=d;
    }
  }

  if(!best) best=dirs[Math.floor(Math.random()*4)];

  g.x=wrap(g.x+best.dx);
  g.y=wrap(g.y+best.dy);
}

/* COLLISION */
function check(){
  ghosts.forEach(g=>{
    if(g.x===pac.x && g.y===pac.y){

      if(frightened>0 && g.state!=="eyes"){
        g.state="eyes";
        freeze=6;
        return;
      }

      alert("Game Over");
      location.reload();
    }
  });
}

/* 🟡 WIN CHECK */
function checkWin(){
  for(let y=0;y<SIZE;y++){
    for(let x=0;x<SIZE;x++){
      if(map[y][x]===2 || map[y][x]===3){
        return false;
      }
    }
  }

  running=false;
  document.getElementById("win").style.display="flex";
  return true;
}

/* DRAW PAC */
function drawPac(){
  let x=pac.x*TILE+12;
  let y=pac.y*TILE+12;

  let mouth=Math.abs(Math.sin(pac.anim))*0.6;
  let dir=Math.atan2(pac.dy,pac.dx);

  ctx.fillStyle="yellow";
  ctx.beginPath();
  ctx.moveTo(x,y);
  ctx.arc(x,y,10,dir+mouth,dir+Math.PI*2-mouth);
  ctx.closePath();
  ctx.fill();
}

/* DRAW GHOSTS */
function drawGhost(g){
  if(g.state==="eyes"){
    ctx.fillStyle="white";
  } else if(frightened>0){
    ctx.fillStyle="blue";
  } else {
    ctx.fillStyle=g.color;
  }

  ctx.beginPath();
  ctx.arc(g.x*TILE+12,g.y*TILE+12,10,0,Math.PI*2);
  ctx.fill();
}

/* MAP */
function drawMap(){
  for(let y=0;y<SIZE;y++){
    for(let x=0;x<SIZE;x++){
      if(map[y][x]===1){
        ctx.fillStyle="#1e3a8a";
        ctx.fillRect(x*TILE,y*TILE,TILE,TILE);
      }
      if(map[y][x]===2){
        ctx.fillStyle="gold";
        ctx.beginPath();
        ctx.arc(x*TILE+12,y*TILE+12,3,0,Math.PI*2);
        ctx.fill();
      }
      if(map[y][x]===3){
        ctx.fillStyle="white";
        ctx.beginPath();
        ctx.arc(x*TILE+12,y*TILE+12,6,0,Math.PI*2);
        ctx.fill();
      }
    }
  }
}

/* LOOP */
function loop(){
  if(!running) return;

  tick++;

  if(freeze>0){
    freeze--;
  } else {
    movePac();

    ghostTick++;

    if(ghostTick % 3 === 0){
      ghosts.forEach(g=>{
        if(frightened>0 && g.state!=="eyes"){
          if(Math.random()<0.4) moveGhost(g);
        } else {
          moveGhost(g);
        }
      });
    }

    check();
    checkWin(); // 🟡 NEW WIN CONDITION
  }

  if(frightened>0) frightened--;

  ctx.clearRect(0,0,480,480);
  drawMap();
  drawPac();
  ghosts.forEach(drawGhost);
}

/* START */
function startGame(){
  document.getElementById("menu").style.display="none";
  running=true;
  init();
  setInterval(loop,140);
}
</script>

</body>
</html>
